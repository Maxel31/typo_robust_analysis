version: 1
description: 'ARR August 2026 resubmission: frozen prompt/decoding/seed registry (Step
  0). All experiment code must reference this registry.'
seed: 42
decoding:
  do_sample: false
  temperature: 0.0
  max_new_tokens: 512
models:
  Llama-3.2-1B-Instruct:
    hf_id: meta-llama/Llama-3.2-1B-Instruct
  Llama-3.2-3B-Instruct:
