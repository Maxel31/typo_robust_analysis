    # gsm8k/mmlu 4096, math 8192 (reasoning 系のため decoding 凍結値の例外)
    prompt_style: zero_shot_chat_template
benchmarks:
- gsm8k
- mmlu
- mmlu_pro
- arc
- commonsense_qa
- math
conditions:
