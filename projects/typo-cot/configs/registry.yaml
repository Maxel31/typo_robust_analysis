    perturbation_mode: importance
    num_perturbations: 2
  lxt4:
    perturbation_mode: importance
    num_perturbations: 4
  lxt8:
    perturbation_mode: importance
    num_perturbations: 8
  random4:
    perturbation_mode: random
    num_perturbations: 4
  anti_lxt4:
    perturbation_mode: bottom_k
    num_perturbations: 4
perturbation_types:
- proximity
- double_typing
- omission
