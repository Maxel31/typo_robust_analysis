models:
  - meta-llama/Llama-3.2-1B
  - meta-llama/Llama-3.2-3B
  - meta-llama/Llama-3.1-8B
  - google/gemma-2-2b
  - google/gemma-2-9b
  - Qwen/Qwen2.5-1.5B
  - Qwen/Qwen2.5-3B
  - Qwen/Qwen2.5-7B
  - mistralai/Mistral-7B-v0.3

methods:
  gptq:
    bits: [4, 8]
    group_size: 128
  awq:
    bits: [4, 8]
    group_size: 128
  smoothquant:
    bits: [4, 8]
    group_size: 128
  qep:
    bits: [4, 8]
    group_size: 128

calibration:
  dataset: wikitext
  num_samples: 512
  max_length: 2048
  seed: 42

gpu_ids: [2, 3]
output_root: ./data/quantized
